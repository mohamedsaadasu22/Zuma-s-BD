<script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const msgBtn = document.getElementById('msgBtn');
        const messageBox = document.getElementById('messageBox');
        const closeMsg = document.getElementById('closeMsg');
        const lightning = document.getElementById('lightning');
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        const romanticMusic = document.getElementById('romanticMusic');
        const noMusic = document.getElementById('noMusic');
        const yesMusic = document.getElementById('yesMusic');

        let noCount = 0;
        let scale = 1;
        let rainIntensity = 15; // Starting rain drops

        // Init Canvas & Stars
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        let stars = [];
        const starColors = ['#000000', '#FFFF00', '#008000', '#0000FF', '#FF00FF', '#FFA500'];
        for(let i=0; i<80; i++) stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*2, color: starColors[Math.floor(Math.random()*6)], speed: Math.random()*0.5 });
        function animateStars() { ctx.clearRect(0,0,canvas.width, canvas.height); stars.forEach(s => { ctx.fillStyle=s.color; ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill(); s.y+=s.speed; if(s.y>canvas.height) s.y=0; }); requestAnimationFrame(animateStars); }
        animateStars();

        // Function to spawn clouds
        function spawnCloud(color = "white") {
            let cloud = document.createElement('div');
            cloud.className = 'cloud';
            cloud.style.backgroundColor = color;
            cloud.style.top = (Math.random() * 30) + '%';
            cloud.style.animationDelay = (Math.random() * 5) + 's';
            cloud.style.left = "-200px";
            document.body.appendChild(cloud);
        }

        // Initial Clouds
        for (let i = 0; i < 4; i++) spawnCloud();

        // Interaction
        window.addEventListener('click', () => { if(noCount === 0 && finalContent.style.display === 'none') romanticMusic.play().catch(()=>{}); }, {once: true});

        function createRain(amount) {
            for(let i=0; i<amount; i++) {
                let drop = document.createElement('div');
                drop.className = 'rain';
                drop.style.left = Math.random() * 100 + 'vw';
                // Randomize speed slightly for realism
                drop.style.animationDuration = (Math.random() * 0.2 + 0.3) + 's';
                document.body.appendChild(drop);
                setTimeout(() => drop.remove(), 1000);
            }
        }

        noBtn.addEventListener('click', () => {
            noCount++;
            rainIntensity += 15; // Adds 15 more drops every click
            
            romanticMusic.pause();
            noMusic.play().catch(()=>{});
            
            // Background gets darker each time
            let darkness = Math.max(20, 68 - (noCount * 5)); 
            document.body.style.backgroundColor = `rgb(${darkness}, ${darkness}, ${darkness})`;
            
            // Turn existing clouds grey and add a new dark cloud every click
            document.querySelectorAll('.cloud').forEach(c => c.style.backgroundColor = "#555");
            spawnCloud("#555");
            
            createRain(rainIntensity);

            // Lightning becomes more frequent
            if(Math.random() > 0.3) { 
                lightning.classList.add('flash-it'); 
                setTimeout(() => lightning.classList.remove('flash-it'), 100); 
            }

            if(noCount === 1) noBtn.innerText = "Are you sure?😕";
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = Math.random() * (window.innerWidth - 150) + 'px';
            noBtn.style.top = Math.random() * (window.innerHeight - 100) + 'px';
            
            scale += 0.4;
            yesBtn.style.transform = `scale(${scale})`;
        });

        yesBtn.addEventListener('click', () => {
            noMusic.pause(); romanticMusic.pause();
            yesMusic.play().catch(()=>{});
            document.body.style.backgroundColor = "#ffe4e1";
            
            // Clear the storm
            document.querySelectorAll('.rain').forEach(r => r.remove());
            document.querySelectorAll('.cloud').forEach(c => c.style.backgroundColor = "white");
            
            document.getElementById('btnContainer').style.display = 'none';
            document.getElementById('question').style.display = 'none';
            document.getElementById('finalContent').style.display = 'block';
            msgBtn.style.display = 'block';
            
            setInterval(updateCountdown, 1000); updateCountdown();
            
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'heart-float';
                heart.innerText = ['💘','♥','💖'][Math.floor(Math.random()*3)];
                heart.style.left = Math.random() * 100 + 'vw';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 4000);
            }, 300);
            
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        });

        function updateCountdown() {
            const target = new Date("March 28, 2026 19:00:00").getTime();
            const now = new Date().getTime();
            const diff = target - now;
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById('countdown').innerHTML = `Time remaining: ${d}d ${h}h ${m}m ${s}s`;
        }

        msgBtn.addEventListener('click', () => { messageBox.style.display = 'block'; });
        closeMsg.addEventListener('click', () => { messageBox.style.display = 'none'; });
    </script>
