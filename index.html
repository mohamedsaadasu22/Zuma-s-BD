<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Sky Full of Stars</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            background-color: #ffe4e1; /* Pink background */
            margin: 0; height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden; transition: background 1s ease;
        }

        /* Interactive Stars Layer - Sent to Back */
        #star-canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; z-index: -1; 
            pointer-events: none;
        }

        /* Clouds Layer */
        .cloud {
            position: absolute; background: white;
            width: 120px; height: 40px; border-radius: 50px;
            top: 10%; opacity: 0.8;
            animation: moveClouds 25s linear infinite;
            z-index: 1; transition: background 1s;
        }
        .cloud::after, .cloud::before {
            content: ''; position: absolute; background: inherit;
            width: 60px; height: 60px; border-radius: 50%; top: -25px; left: 20px;
        }

        #question {
            font-size: 28px; color: red; font-weight: bold;
            position: absolute; top: 15%; width: 85%;
            text-align: center; z-index: 10;
        }

        /* Buttons Container - Brought to Front */
        .container { 
            display: flex; gap: 20px; z-index: 20; 
            position: relative;
        }

        button {
            padding: 15px 35px; font-size: 20px; border: none;
            border-radius: 15px; cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            pointer-events: auto !important; /* Forces clickability */
        }

        #yesBtn { background-color: #4CAF50; color: white; }
        #noBtn { background-color: #f44336; color: white; }

        /* Final UI */
        #finalContent {
            display: none; z-index: 30; text-align: center;
        }
        #countdown {
            margin-top: 20px; font-size: 22px; color: #d81b60; font-weight: bold;
            background: rgba(255,255,255,0.7); padding: 15px 25px; border-radius: 20px;
        }

        /* Floating Hearts */
        .heart-float {
            position: absolute; bottom: -50px;
            font-size: 24px; animation: floatUp 4s linear forwards;
            z-index: 5;
        }
        @keyframes floatUp {
            to { transform: translateY(-110vh) translateX(50px); opacity: 0; }
        }

        .rain { position: absolute; width: 2px; height: 20px; background: white; top: -20px; animation: fall 0.4s linear infinite; z-index: 4; }
        @keyframes fall { to { transform: translateY(100vh); } }
        @keyframes moveClouds { from { left: -200px; } to { left: 100%; } }
    </style>
</head>

        <button id="yesBtn">Yes</button>

    </div>

        <h2 style="color: #d81b60; font-size: 28px;">I Knew you would say yes🥰</h2>
        <p style="font-size: 22px; color: #333;">You just made me the happiest person 💕<br>
        <strong>Be ready at 7:00 pm SHARP & Wear a nice dress</strong></p>
        <div id="countdown">Loading timer...</div>
    </div>
