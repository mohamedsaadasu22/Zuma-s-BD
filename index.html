<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A Sky Full of Stars - For Zuma</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: #ffe4e1;
            margin: 0; padding: 0;
            min-height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Georgia', serif;
            overflow-x: hidden;
            transition: background 1s ease;
        }

        body.modal-open { overflow: hidden; position: fixed; width: 100%; }

        #star-canvas { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }

        .lightning-flash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; z-index: 50; pointer-events: none;
        }
        .flash-it { animation: flashAnim 0.1s ease-out; }
        @keyframes flashAnim { 0% { opacity: 0; } 50% { opacity: 0.8; } 100% { opacity: 0; } }

        .rain { position: absolute; width: 2px; height: 25px; background: rgba(255,255,255,0.6); top: -30px; animation: fall 0.4s linear infinite; z-index: 2; }
        @keyframes fall { to { transform: translateY(110vh); } }

        .main-wrapper {
            width: 90%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 0;
            z-index: 10;
            text-align: center;
        }

        #question { font-size: 24px; color: red; font-weight: bold; margin-bottom: 40px; }

        .container {
            display: flex; gap: 20px; justify-content: center; align-items: center;
            flex-wrap: wrap; min-height: 150px;
        }

        button {
            padding: 15px 30px; font-size: 18px; border: none; border-radius: 15px;
            cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s ease;
        }
        #yesBtn { background-color: #4CAF50; color: white; }
        #noBtn { background-color: #f44336; color: white; }

        #finalContent { display: none; margin-top: 20px; width: 100%; }
        #countdown {
            margin: 20px auto; font-size: 18px; color: #d81b60; font-weight: bold;
            background: rgba(255,255,255,0.8); padding: 15px; border-radius: 15px;
            display: inline-block;
        }

        /* Buttons styling */
        .action-btns { display: flex; flex-direction: column; gap: 15px; align-items: center; margin-top: 20px; }
        #msgBtn, #vidBtn { display: none; background-color: #d81b60; color: white; animation: bounce 2s infinite; width: 250px; }
        #vidBtn { background-color: #333; animation-delay: 0.5s; }

        /* Overlays */
        .overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            z-index: 200; justify-content: center; align-items: center;
        }

        #messageBox {
            width: 90%; max-width: 500px; max-height: 80vh;
            background: white; padding: 25px; border-radius: 20px;
            overflow-y: auto; text-align: left; position: relative;
        }

        /* Video Container */
        #videoContainer { width: 95%; max-width: 800px; position: relative; }
        video { width: 100%; border-radius: 10px; box-shadow: 0 0 20px rgba(255,255,255,0.2); }
        .close-vid { position: absolute; top: -45px; right: 0; color: white; background: none; border: 1px solid white; padding: 5px 15px; }

        .cloud { position: absolute; background: white; width: 100px; height: 35px; border-radius: 50px; z-index: 1; pointer-events: none; }
        .cloud::after, .cloud::before { content: ''; position: absolute; background: inherit; width: 50px; height: 50px; border-radius: 50%; top: -20px; left: 15px; }
        @keyframes moveClouds { from { left: -150px; } to { left: 100%; } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .heart-float { position: absolute; bottom: -50px; font-size: 24px; animation: floatUp 4s linear forwards; z-index: 5; }
        @keyframes floatUp { to { transform: translateY(-110vh) translateX(50px); opacity: 0; } }
    </style>
</head>
<body>

    <div id="lightning" class="lightning-flash"></div>
    <canvas id="star-canvas"></canvas>

    <audio id="romanticMusic" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3"></audio>
    <audio id="noMusic" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3"></audio>
    <audio id="yesMusic" loop src="yes.mp3"></audio>

    <div class="main-wrapper">
        <h1 id="question">Will you spent your birthday with you favorite DIDI?😁</h1>

        <div class="container" id="btnContainer">
            <button id="yesBtn">Yes</button>
            <button id="noBtn">No</button>
        </div>

        <div id="finalContent">
            <h2 style="color: #d81b60;">I Knew you would say Yes🥰</h2>
            <p>You just made me the happiest person 💕</p>
            <p><strong>Be ready at 4:30 pm SHARP & Wear a nice dress</strong></p>
            <div id="countdown">Loading timer...</div>
            
            <div class="action-btns">
                <button id="msgBtn">Click here for your BD Message🌚</button>
                <button id="vidBtn">Click here for your BD Video 🌚</button>
            </div>
        </div>
    </div>

    <div class="overlay" id="msgOverlay">
        <div id="messageBox">
            <h3 style="text-align: center; color: #d81b60;">My Dearest Zuma... ❤️</h3>
            <p>If there’s one thing I wish you could see...</p>
            <p>Happy birthday ya Habebt Alby ❤️🎂</p>
            <button id="closeMsg" style="display:block; margin: 20px auto; background:#ffb6c1; color:white; width: 100%;">Close with Love</button>
        </div>
    </div>

    <div class="overlay" id="vidOverlay">
        <div id="videoContainer">
            <button class="close-vid" id="closeVid">Close X</button>
            <video id="bdVideo" controls>
                <source src="your-video-file.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const msgBtn = document.getElementById('msgBtn');
        const vidBtn = document.getElementById('vidBtn');
        const msgOverlay = document.getElementById('msgOverlay');
        const vidOverlay = document.getElementById('vidOverlay');
        const bdVideo = document.getElementById('bdVideo');
        const closeMsg = document.getElementById('closeMsg');
        const closeVid = document.getElementById('closeVid');
        
        const romanticMusic = document.getElementById('romanticMusic');
        const noMusic = document.getElementById('noMusic');
        const yesMusic = document.getElementById('yesMusic');

        let noCount = 0;
        let scale = 1;

        // ... (Keep Star and Cloud animation code the same as your previous version) ...

        function pauseAllMusic() {
            romanticMusic.pause();
            noMusic.pause();
            yesMusic.pause();
        }

        noBtn.addEventListener('click', () => {
            noCount++;
            pauseAllMusic();
            noMusic.play().catch(()=>{});
            // ... (Keep existing No button logic) ...
            noBtn.style.position = 'fixed';
            noBtn.style.left = Math.random() * (window.innerWidth - 100) + 'px';
            noBtn.style.top = Math.random() * (window.innerHeight - 100) + 'px';
            scale += 0.45;
            yesBtn.style.transform = `scale(${scale})`;
        });

        yesBtn.addEventListener('click', () => {
            pauseAllMusic();
            yesMusic.play().catch(()=>{});
            document.getElementById('btnContainer').style.display = 'none';
            document.getElementById('question').style.display = 'none';
            document.getElementById('finalContent').style.display = 'block';
            msgBtn.style.display = 'block';
            vidBtn.style.display = 'block';
            setInterval(updateCountdown, 1000);
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        });

        // Message Box Logic
        msgBtn.addEventListener('click', () => { 
            msgOverlay.style.display = 'flex'; 
            document.body.classList.add('modal-open');
        });
        closeMsg.addEventListener('click', () => { 
            msgOverlay.style.display = 'none'; 
            document.body.classList.remove('modal-open');
        });

        // Video Box Logic
        vidBtn.addEventListener('click', () => {
            pauseAllMusic(); // Stops the "Yes" song so she can hear the video
            vidOverlay.style.display = 'flex';
            bdVideo.play();
            document.body.classList.add('modal-open');
        });

        closeVid.addEventListener('click', () => {
            bdVideo.pause();
            bdVideo.currentTime = 0;
            vidOverlay.style.display = 'none';
            document.body.classList.remove('modal-open');
            yesMusic.play(); // Optional: resume music after video
        });

        function updateCountdown() {
            const target = new Date("March 28, 2026 19:00:00").getTime();
            const now = new Date().getTime();
            const diff = target - now;
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById('countdown').innerHTML = `Time remaining: ${d}d ${h}h ${m}m ${s}s`;
        }
    </script>
</body>
</html>
