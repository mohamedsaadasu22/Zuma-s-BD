<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Question</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            background-color: #ffe4e1; /* Cute pinkish background */
            background-image: radial-gradient(white 1px, transparent 0);
            background-size: 40px 40px; /* Subtle star-like pattern */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
        }

        #question {
            font-size: 24px;
            color: red;
            font-weight: bold;
            position: absolute;
            top: 20%;
            width: 90%;
        }

        .container {
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: center;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        #yesBtn {
            background-color: #4CAF50;
            color: white;
            z-index: 10;
        }

        #noBtn {
            background-color: #f44336;
            color: white;
            position: relative;
        }

        #finalMessage {
            display: none;
            font-size: 22px;
            color: #d81b60;
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1 id="question">Will you spend the day with your fav. Didi?</h1>

    <div class="container" id="btnContainer">
        <button id="yesBtn">Yes</button>
        <button id="noBtn">No</button>
    </div>

    <div id="finalMessage">You just made me the happiest person 💕</div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const question = document.getElementById('question');
        const btnContainer = document.getElementById('btnContainer');
        const finalMessage = document.getElementById('finalMessage');

        let noClickCount = 0;
        let yesScale = 1;

        noBtn.addEventListener('click', () => {
            noClickCount++;

            if (noClickCount === 1) {
                noBtn.innerText = "Are you sure?😕";
            }

            if (noClickCount >= 2) {
                // Move No button to random position
                const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
                const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
                
                noBtn.style.position = 'absolute';
                noBtn.style.left = x + 'px';
                noBtn.style.top = y + 'px';

                // Make Yes button bigger
                yesScale += 0.4;
                yesBtn.style.transform = `scale(${yesScale})`;
            }

            // Stop moving after 20 times (optional limit check)
            if (noClickCount > 21) {
                noBtn.style.display = 'none';
            }
        });

        yesBtn.addEventListener('click', () => {
            // Update Text
            question.innerText = "Knew you'd say yes";
            
            // UI Changes
            btnContainer.style.display = 'none';
            noBtn.style.display = 'none';
            finalMessage.style.display = 'block';

            // Celebration Vibes (Fireworks/Confetti)
            var duration = 5 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
              return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function() {
              var timeLeft = animationEnd - Date.now();

              if (timeLeft <= 0) {
                return clearInterval(interval);
              }

              var particleCount = 50 * (timeLeft / duration);
              confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
              confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        });
    </script>
</body>
</html>
