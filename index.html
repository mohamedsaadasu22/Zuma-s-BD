<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Birthday Question</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #ffe4e1;
        }
        body {
            background-color: var(--bg-color);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            transition: background 0.5s ease;
        }

        /* Clouds */
        .cloud {
            position: absolute;
            background: white;
            width: 100px; height: 30px;
            border-radius: 50px;
            top: 50px;
            opacity: 0.8;
            animation: moveClouds 20s linear infinite;
        }
        .cloud::after, .cloud::before {
            content: ''; position: absolute; background: white;
            width: 50px; height: 50px; border-radius: 50%; top: -20px; left: 15px;
        }
        .cloud::after { width: 40px; height: 40px; top: -15px; left: 45px; }

        @keyframes moveClouds {
            from { left: -150px; }
            to { left: 100%; }
        }

        /* Stars */
        .star {
            position: absolute;
            width: 4px; height: 4px;
            border-radius: 50%;
            z-index: -1;
        }

        #question {
            font-size: 28px;
            color: red;
            font-weight: bold;
            position: absolute;
            top: 20%;
            width: 80%;
            text-align: center;
            z-index: 10;
        }

        .container { display: flex; gap: 20px; z-index: 10; }

        button {
            padding: 15px 35px;
            font-size: 20px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        #yesBtn { background-color: #4CAF50; color: white; }
        #noBtn { background-color: #f44336; color: white; position: relative; }

        #finalMessage {
            display: none;
            font-size: 24px;
            color: #d81b60;
            font-weight: bold;
            z-index: 10;
        }

        /* Rain & Lightning */
        .rain {
            position: absolute;
            width: 2px; height: 15px;
            background: rgba(255, 255, 255, 0.6);
            top: -20px;
            animation: fall 0.5s linear infinite;
        }
        @keyframes fall { to { transform: translateY(100vh); } }

        .lightning {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; z-index: 5; pointer-events: none;
        }
        .flash { animation: flashAnim 0.2s ease-out; }
        @keyframes flashAnim { 0% { opacity: 0; } 50% { opacity: 0.8; } 100% { opacity: 0; } }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div id="lightning" class="lightning"></div>
    <h1 id="question">Will you spent your birthday with you favorite DIDI?😁</h1>

    <div class="container" id="btnContainer">
        <button id="yesBtn">Yes</button>
        <button id="noBtn">No</button>
    </div>

    <div id="finalMessage">You just made me the happiest person💕</div>

    <script>
        const colors = ['#000000', '#FFFF00', '#008000', '#0000FF', '#FF00FF', '#FFA500'];
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const question = document.getElementById('question');
        const finalMessage = document.getElementById('finalMessage');
        const music = document.getElementById('bgMusic');
        const lightning = document.getElementById('lightning');
        
        let noCount = 0;
        let scale = 1;

        // Create Random Stars
        for (let i = 0; i < 100; i++) {
            let star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            document.body.appendChild(star);
        }

        // Create Clouds
        for (let i = 0; i < 4; i++) {
            let cloud = document.createElement('div');
            cloud.className = 'cloud';
            cloud.style.top = (Math.random() * 30) + '%';
            cloud.style.animationDelay = (Math.random() * 10) + 's';
            document.body.appendChild(cloud);
        }

        function createRain() {
            for(let i=0; i<10; i++) {
                let drop = document.createElement('div');
                drop.className = 'rain';
                drop.style.left = Math.random() * 100 + 'vw';
                drop.style.animationDuration = (Math.random() * 0.5 + 0.3) + 's';
                document.body.appendChild(drop);
                setTimeout(() => drop.remove(), 2000);
            }
        }

        noBtn.addEventListener('click', () => {
            noCount++;
            music.play(); // Starts music on interaction
            
            // Start the "Storm"
            document.body.style.backgroundColor = "#555"; 
            createRain();
            if(Math.random() > 0.5) {
                lightning.classList.add('flash');
                setTimeout(() => lightning.classList.remove('flash'), 200);
            }

            if(noCount === 1) noBtn.innerText = "Are you sure?😕";
            
            // Move No Button & Grow Yes Button
            const x = Math.random() * (window.innerWidth - 150);
            const y = Math.random() * (window.innerHeight - 150);
            noBtn.style.position = 'absolute';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';

            scale += 0.5;
            yesBtn.style.transform = `scale(${scale})`;
        });

        yesBtn.addEventListener('click', () => {
            music.play();
            question.innerText = "I Knew you would say yes🥰";
            document.body.style.backgroundColor = "#ffe4e1"; // Back to pink
            document.querySelectorAll('.rain').forEach(r => r.remove());
            
            document.getElementById('btnContainer').style.display = 'none';
            finalMessage.style.display = 'block';

            // Firework effect
            var end = Date.now() + (5 * 1000);
            (function frame() {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 } });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 } });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        });
    </script>
</body>
</html>
